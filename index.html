<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NotsCreator - Editor de Notas Musicales</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #333;
            overflow-x: hidden;
        }

        .header {
            text-align: center;
            padding: 30px 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            color: #e94560;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .header p {
            color: #a0a0a0;
            font-size: 1.1rem;
        }

        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .btn-primary {
            background: linear-gradient(135deg, #e94560 0%, #ff6b6b 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.4);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
            color: white;
            border: 2px solid #e94560;
        }

        .btn-secondary:hover {
            background: #e94560;
            transform: translateY(-2px);
        }

        .btn-success {
            background: linear-gradient(135deg, #00d9ff 0%, #00b4d8 100%);
            color: #1a1a2e;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 217, 255, 0.4);
        }

        .instruments {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .instrument-btn {
            padding: 10px 20px;
            border: 2px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1);
            color: white;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .instrument-btn.active {
            background: #e94560;
            border-color: #e94560;
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
        }

        .instrument-btn:hover {
            background: rgba(233, 69, 96, 0.3);
        }

        .sheet-container {
            background: #f5f5dc;
            background-image: 
                linear-gradient(90deg, transparent 98%, rgba(200,180,160,0.3) 98%),
                linear-gradient(rgba(200,180,160,0.1) 1px, transparent 1px);
            background-size: 100% 100%, 100% 30px;
            border-radius: 10px;
            box-shadow: 
                0 10px 40px rgba(0,0,0,0.3),
                inset 0 0 60px rgba(139, 69, 19, 0.1);
            padding: 40px;
            overflow-x: auto;
            position: relative;
            min-height: 400px;
            border: 1px solid #d4c4a8;
        }

        .sheet-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M11 18c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm-43-7c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm63 31c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM34 90c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm56-76c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM12 86c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm28-65c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm23-11c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-6 60c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm29 22c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zM32 63c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm57-13c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-9-21c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM60 91c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM35 41c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM12 60c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2z' fill='%239C92AC' fill-opacity='0.03' fill-rule='evenodd'/%3E%3C/svg%3E");
            opacity: 0.5;
            pointer-events: none;
        }

        .timeline {
            display: flex;
            align-items: center;
            min-width: 2000px;
            height: 200px;
            position: relative;
            padding: 0 50px;
        }

        .staff-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: #5c4033;
            left: 0;
        }

        .staff-line:nth-child(1) { top: 40px; }
        .staff-line:nth-child(2) { top: 70px; }
        .staff-line:nth-child(3) { top: 100px; }
        .staff-line:nth-child(4) { top: 130px; }
        .staff-line:nth-child(5) { top: 160px; }

        .clef {
            position: absolute;
            left: 20px;
            top: 30px;
            font-size: 80px;
            color: #5c4033;
            font-family: serif;
            z-index: 10;
        }

        .note-slot {
            width: 60px;
            height: 180px;
            position: relative;
            cursor: pointer;
            transition: all 0.2s ease;
            border-radius: 5px;
        }

        .note-slot:hover {
            background: rgba(233, 69, 96, 0.1);
        }

        .note-slot:hover::after {
            content: '+';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            color: #e94560;
            opacity: 0.5;
        }

        .note {
            position: absolute;
            width: 24px;
            height: 20px;
            background: #1a1a2e;
            border-radius: 50%;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .note:hover {
            transform: translateX(-50%) scale(1.2);
            background: #e94560;
        }

        .note::before {
            content: '';
            position: absolute;
            width: 3px;
            height: 40px;
            background: #1a1a2e;
            right: -3px;
            top: -35px;
        }

        .note:hover::before {
            background: #e94560;
        }

        .note.guitar { background: #ff6b6b; }
        .note.guitar::before { background: #ff6b6b; }

        .note.bass { background: #4ecdc4; }
        .note.bass::before { background: #4ecdc4; }

        .note.drums { background: #ffe66d; }
        .note.drums::before { background: #ffe66d; }

        .note.piano { background: #a8e6cf; }
        .note.piano::before { background: #a8e6cf; }

        .note-label {
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            color: #666;
            white-space: nowrap;
            font-weight: 600;
        }

        .saved-songs {
            margin-top: 30px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 25px;
            backdrop-filter: blur(10px);
        }

        .saved-songs h3 {
            color: #e94560;
            margin-bottom: 15px;
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
        }

        .song-list {
            display: grid;
            gap: 10px;
        }

        .song-item {
            background: rgba(255,255,255,0.1);
            padding: 15px 20px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .song-item:hover {
            background: rgba(233, 69, 96, 0.2);
            transform: translateX(5px);
        }

        .song-name {
            color: white;
            font-weight: 500;
        }

        .song-actions {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            font-size: 16px;
        }

        .play-btn {
            background: #00d9ff;
            color: #1a1a2e;
        }

        .delete-btn {
            background: #e94560;
            color: white;
        }

        .icon-btn:hover {
            transform: scale(1.1);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #e94560;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .modal-content h3 {
            color: #e94560;
            margin-bottom: 20px;
            font-family: 'Playfair Display', serif;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            border: 2px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: white;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 1rem;
        }

        .modal-content input:focus {
            outline: none;
            border-color: #e94560;
        }

        .playback-indicator {
            position: absolute;
            width: 3px;
            height: 100%;
            background: #00d9ff;
            box-shadow: 0 0 10px #00d9ff;
            left: 0;
            top: 0;
            display: none;
            z-index: 100;
        }

        .playback-indicator.active {
            display: block;
            animation: movePlayback 4s linear forwards;
        }

        @keyframes movePlayback {
            from { left: 0; }
            to { left: 100%; }
        }

        .tempo-control {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            margin: 0 20px;
        }

        .tempo-control input {
            width: 60px;
            padding: 5px;
            border-radius: 5px;
            border: none;
            text-align: center;
        }

        .legend {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: white;
            font-size: 0.9rem;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 50%;
        }

        .scroll-hint {
            text-align: center;
            color: #888;
            margin-top: 10px;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .header h1 { font-size: 2rem; }
            .controls { flex-direction: column; align-items: center; }
            .sheet-container { padding: 20px; }
            .timeline { min-width: 1000px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>♪ NotsCreator ♪</h1>
        <p>Editor Profesional de Partituras Musicales</p>
    </div>

    <div class="main-container">
        <div class="instruments">
            <button class="instrument-btn active" data-instrument="guitar">🎸 Guitarra</button>
            <button class="instrument-btn" data-instrument="bass">🎸 Bajo</button>
            <button class="instrument-btn" data-instrument="drums">🥁 Batería</button>
            <button class="instrument-btn" data-instrument="piano">🎹 Piano</button>
        </div>

        <div class="controls">
            <button class="btn btn-primary" onclick="clearSheet()">🗑️ Limpiar</button>
            <button class="btn btn-secondary" onclick="showSaveModal()">💾 Guardar Notas</button>
            <button class="btn btn-success" onclick="playComposition()">▶️ Reproducir</button>
            <div class="tempo-control">
                <span>Tempo:</span>
                <input type="number" id="tempo" value="120" min="60" max="200">
                <span>BPM</span>
            </div>
        </div>

        <div class="sheet-container" id="sheetContainer">
            <div class="playback-indicator" id="playbackIndicator"></div>
            <div class="timeline" id="timeline">
                <div class="clef">𝄞</div>
                <div class="staff-line"></div>
                <div class="staff-line"></div>
                <div class="staff-line"></div>
                <div class="staff-line"></div>
                <div class="staff-line"></div>
            </div>
        </div>

        <p class="scroll-hint">← Desliza horizontalmente para ver más →</p>

        <div class="legend">
            <div class="legend-item">
                <div class="legend-color" style="background: #ff6b6b;"></div>
                <span>Guitarra</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #4ecdc4;"></div>
                <span>Bajo</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #ffe66d;"></div>
                <span>Batería</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #a8e6cf;"></div>
                <span>Piano</span>
            </div>
        </div>

        <div class="saved-songs">
            <h3>🎼 Mis Composiciones Guardadas</h3>
            <div class="song-list" id="songList">
                <p style="color: #888; text-align: center;">No hay canciones guardadas aún</p>
            </div>
        </div>
    </div>

    <div class="modal" id="saveModal">
        <div class="modal-content">
            <h3>💾 Guardar Composición</h3>
            <input type="text" id="songName" placeholder="Nombre de tu canción...">
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button class="btn btn-primary" onclick="saveSong()">Guardar</button>
                <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
